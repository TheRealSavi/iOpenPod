# Build multi-platform binaries and publish a GitHub Release on every tag.
#
# Trigger: push a tag like v1.0.0 (or v1.2.3-beta.1, etc.)
#
#   git tag v1.0.0
#   git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # needed to create GitHub Releases

jobs:
  # ── Build matrix ────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: iOpenPod-Windows
            archive_name: iOpenPod-Windows.zip

          - os: macos-14          # Apple Silicon (arm64); Intel Macs use Rosetta 2
            artifact: iOpenPod-macOS
            archive_name: iOpenPod-macOS.zip

          - os: ubuntu-22.04
            artifact: iOpenPod-Linux
            archive_name: iOpenPod-Linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Python + uv ─────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # Linux: install Qt runtime deps (no display needed for build)
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3

      - name: Install project dependencies
        run: uv sync

      # ── PyInstaller build ───────────────────────────────────────────
      - name: Build with PyInstaller
        run: uv run pyinstaller iOpenPod.spec --noconfirm

      # ── Package archive ─────────────────────────────────────────────
      # macOS: ad-hoc sign all binaries so Gatekeeper doesn't kill the app
      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          # Sign every .so/.dylib and the main executable, then the .app bundle
          find dist/iOpenPod.app -type f \( -name '*.so' -o -name '*.dylib' \) \
            -exec codesign --force --sign - --options runtime --entitlements entitlements.plist {} \;
          codesign --force --sign - --options runtime --entitlements entitlements.plist \
            dist/iOpenPod.app/Contents/MacOS/iOpenPod
          codesign --force --sign - --options runtime --entitlements entitlements.plist \
            dist/iOpenPod.app
          # Verify
          codesign --verify --deep --strict dist/iOpenPod.app
          echo "Code signing verified OK"

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\iOpenPod\* -DestinationPath iOpenPod-Windows.zip
        shell: pwsh

      - name: Create archive (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../${{ matrix.archive_name }} iOpenPod.app/

      - name: Create archive (Linux)
        if: runner.os == 'Linux'
        run: cd dist && tar czf ../${{ matrix.archive_name }} iOpenPod/

      # ── Checksums ───────────────────────────────────────────────────
      - name: Generate SHA-256 checksum
        run: |
          python -c "
          import hashlib, pathlib, sys
          p = pathlib.Path('${{ matrix.archive_name }}')
          h = hashlib.sha256(p.read_bytes()).hexdigest()
          out = f'{h}  {p.name}\n'
          pathlib.Path(p.name + '.sha256').write_text(out)
          print(out.strip())
          "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256

  # ── Publish GitHub Release ──────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.zip
            *.tar.gz
            *.sha256
